<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Callen Kennels{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/mvp.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
  <div class="top-accent"></div>

  <nav class="site-nav">
    <a class="nav-link" href="{% url 'home' %}">Home</a>

    <div class="nav-dropdown">
      <button class="nav-dropbtn" type="button">
        About Callen Kennels <span class="chev">▾</span>
      </button>
      <div class="nav-dropdown-menu">
        <a href="{% url 'about' %}">Callen Kennels</a>
        <a href="{% url 'about_breed' %}">The Breed</a>
      </div>
    </div>

    <div class="nav-dropdown">
      <button class="nav-dropbtn" type="button">
        Puppies <span class="chev">▾</span>
      </button>
      <div class="nav-dropdown-menu">
        <a href="{% url 'puppies_available' %}">Available Now</a>
        <a href="{% url 'litters_past' %}">Past Puppies</a>
      </div>
    </div>

    <div class="nav-dropdown">
      <button class="nav-dropbtn" type="button">
        My Dogs <span class="chev">▾</span>
      </button>
      <div class="nav-dropdown-menu">
        <a href="{% url 'dogs_girls' %}">My Girls</a>
        <a href="{% url 'dogs_boys' %}">My Boys</a>
      </div>
    </div>

    <div class="nav-dropdown">
      <button class="nav-dropbtn" type="button">
        Ruff House Dog Supplies <span class="chev">▾</span>
      </button>
      <div class="nav-dropdown-menu">
        <a href="{% url 'supplies_list' %}">Supplies</a>
      </div>
    </div>
  </nav>
</header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>&copy; {{ now|date:"Y" }} Callen Kennels</small>
  </footer>
</body>
</html>
